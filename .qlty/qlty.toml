config_version = "0"

exclude_patterns = [
    ".sinemacula/**",
    "SineMaculaLaravel/Tests/**/*.inc",
    "*_min.*",
    "*-min.*",
    "*.min.*",
    "**/.yarn/**",
    "**/*.d.ts",
    "**/assets/**",
    "**/bower_components/**",
    "**/build/**",
    "**/cache/**",
    "**/config/**",
    "**/db/**",
    "**/deps/**",
    "**/dist/**",
    "**/extern/**",
    "**/external/**",
    "**/generated/**",
    "**/Godeps/**",
    "**/gradlew/**",
    "**/mvnw/**",
    "**/node_modules/**",
    "**/protos/**",
    "**/seed/**",
    "**/target/**",
    "**/templates/**",
    "**/testdata/**",
    "**/vendor/**",
]

test_patterns = [
    "**/test/**",
    "**/spec/**",
    # This repo follows PHPUnit's PascalCase convention (SineMaculaLaravel/Tests, *Test.php),
    # which the default lowercase patterns below do not match; without these, qlty
    # treats the sniff tests as source and reports their boilerplate as duplication.
    "**/Tests/**",
    "**/*Test.php",
    "**/*.test.*",
    "**/*.spec.*",
    "**/*_test.*",
    "**/*_spec.*",
    "**/test_*.*",
    "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[source]]
name = "sinemacula"
repository = "https://github.com/sinemacula/coding-standards"
tag = "v1.12.2"

[runtimes.enabled]
php = "8.3"

[[plugin]]
name = "radarlint-php"
mode = "comment"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "editorconfig-checker"

# Dogfood the SineMacula PHP standards on this repo's own code. phpcs and php-cs-fixer
# read the in-tree configs under .qlty/configs (phpcs.xml, .php-cs-fixer.dist.php). The
# shared standard plus slevomat + the installer come from composer.json so the ruleset's
# sniffs resolve in qlty's sandbox.
[[plugin]]
name = "php-codesniffer"
version = "3.13.5"
mode = "comment"
package_file = "composer.json"
package_filters = ["slevomat", "dealerdirect", "sinemacula"]

# Pinned to the last php-cs-fixer release whose symfony/console stays on the 7.x
# line; 3.90+ pulls symfony/console 8 (needs PHP 8.4.1), which qlty's PHP 8.3
# runner cannot parse. Bump once the runner ships PHP 8.4.
[[plugin]]
name = "php-cs-fixer"
version = "3.89.0"
package_file = "composer.json"
package_filters = ["sinemacula"]

# phpstan is NOT wired here: qlty Cloud never runs `composer install`, so it cannot
# autoload the in-repo PHPStan rules or scan PHP_CodeSniffer's non-PSR-4 source that
# the sniff code depends on. It runs in GitHub Actions instead (phpstan.neon.dist).

# php/ holds shipped tool configs and .qlty/configs holds qlty's own PHP config.
# Neither is source, so the PHP plugins skip them - they target src/ and
# SineMaculaLaravel (Sniffs + Tests).
[[exclude]]
plugins = ["php-codesniffer", "php-cs-fixer"]
file_patterns = ["php/**", ".qlty/configs/**"]
